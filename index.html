<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spotify Player - vityaptt</title>
    <style>
        body {
            background-color: #008080; /* Classic Win95 Teal */
            font-family: 'MS Sans Serif', Tahoma, sans-serif;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        *, *::before, *::after { box-sizing: border-box; }

        /* Win95 Window Style */
        .win95-window {
            background-color: #c0c0c0;
            border-top: 2px solid #dfdfdf;
            border-left: 2px solid #dfdfdf;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
            width: 420px;
            padding: 4px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 6px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .title-bar-controls button {
            background-color: #c0c0c0;
            border-top: 1px solid #dfdfdf;
            border-left: 1px solid #dfdfdf;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            width: 16px;
            height: 14px;
            font-size: 9px;
            font-weight: bold;
            line-height: 10px;
            text-align: center;
            cursor: pointer;
        }

        .window-body {
            padding: 6px;
        }

        /* Screen element */
        .screen {
            background-color: #000;
            color: #00ff00;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #dfdfdf;
            border-bottom: 2px solid #dfdfdf;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            height: 65px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .screen-line-1 {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .screen-line-2 {
            font-size: 11px;
            color: #0acc0a;
        }

        /* Sliders and Controls */
        .slider-container {
            margin-bottom: 10px;
            position: relative;
        }

        input[type=range] {
            width: 100%;
            accent-color: #000080;
        }

        .controls-row {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
        }

        .win95-btn {
            background-color: #c0c0c0;
            border-top: 2px solid #dfdfdf;
            border-left: 2px solid #dfdfdf;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            padding: 6px 10px;
            font-family: 'MS Sans Serif', Tahoma, sans-serif;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            flex-grow: 1;
        }

        .win95-btn:active {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #dfdfdf;
            border-bottom: 2px solid #dfdfdf;
            padding: 7px 9px 5px 11px;
        }

        .playlist-btn {
            width: 100%;
            margin-bottom: 10px;
            text-align: left;
            padding: 6px;
        }

        /* Status bar footer */
        .status-bar {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .status-panel {
            background-color: #c0c0c0;
            border-top: 1px solid #404040;
            border-left: 1px solid #404040;
            border-right: 1px solid #dfdfdf;
            border-bottom: 1px solid #dfdfdf;
            padding: 3px 6px;
            font-size: 10px;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="win95-window">
        <div class="title-bar">
            <span>Spotify Player - vityaptt</span>
            <div class="title-bar-controls">
                <button>×</button>
            </div>
        </div>
        
        <div class="window-body">
            <!-- Screen Display -->
            <div class="screen" id="playerScreen">
                <div class="screen-line-1" id="screenLine1">Подключение к Spotify...</div>
                <div class="screen-line-2" id="screenLine2">Инициализация SDK</div>
            </div>

            <!-- Time Slider -->
            <div class="slider-container">
                <input type="range" id="seekSlider" min="0" max="100" value="0">
            </div>

            <!-- Playback Control Buttons -->
            <div class="controls-row">
                <button class="win95-btn" id="prevBtn">⏮</button>
                <button class="win95-btn" id="playBtn" style="flex-grow: 2;">Play / Pause</button>
                <button class="win95-btn" id="nextBtn">⏭</button>
            </div>

            <!-- Playlist Action -->
            <button class="win95-btn playlist-btn" id="loadPlaylistBtn">▶ Запустить плейлист</button>

            <!-- Volume Slider -->
            <div class="slider-container" style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 12px;">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" style="flex-grow:1;">
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-panel" id="sdkStatus">Инициализация SDK...</div>
                <div class="status-panel" id="apiStatus">Spotify API</div>
            </div>
        </div>
    </div>

    <!-- Spotify Web Playback SDK Script -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>

    <script>
        // Твои данные приложения Spotify
        const clientId = 'ТВОЙ_CLIENT_ID'; // Вставь сюда свой Client ID
        const clientSecret = '44e874e29fe64eb992ed03b969123101';
        
        const playlistUri = 'spotify:playlist:7ljNxr...'; 

        let playerInstance = null;
        let deviceId = null;

        const screenLine1 = document.getElementById('screenLine1');
        const screenLine2 = document.getElementById('screenLine2');
        const sdkStatus = document.getElementById('sdkStatus');
        const apiStatus = document.getElementById('apiStatus');

        // Автоматическое получение токена через Client Credentials
        async function getSpotifyAccessToken() {
            try {
                screenLine1.innerText = "Авторизация...";
                screenLine2.innerText = "Запрос токена у API";
                
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': 'Basic ' + btoa(clientId + ':' + clientSecret)
                    },
                    body: new URLSearchParams({
                        grant_type: 'client_credentials'
                    })
                });

                const data = await response.json();
                if (data.access_token) {
                    apiStatus.innerText = "Spotify API: Готов";
                    return data.access_token;
                } else {
                    console.error("Ошибка получения токена:", data);
                    screenLine1.innerText = "Ошибка токена!";
                    screenLine2.innerText = "Проверь Client ID";
                }
            } catch (e) {
                console.error("Сетевая ошибка при запросе токена:", e);
                screenLine1.innerText = "Сетевая ошибка";
            }
            return null;
        }

        // Функция инициализации плеера Spotify SDK
        window.onSpotifyWebPlaybackSDKReady = async () => {
            const token = await getSpotifyAccessToken();
            if (!token) return;

            playerInstance = new Spotify.Player({
                name: 'vityaptt Win95 Player',
                getOAuthToken: cb => { cb(token); },
                volume: 0.5
            });

            // Обработчики событий плеера
            playerInstance.addListener('ready', ({ device_id }) => {
                deviceId = device_id;
                console.log('Плеер готов с Device ID', device_id);
                screenLine1.innerText = "Плеер подключен";
                screenLine2.innerText = "Готов к работе";
                sdkStatus.innerText = "Плеер готов";
            });

            playerInstance.addListener('not_ready', ({ device_id }) => {
                console.log('Device ID покинул сеть', device_id);
                screenLine1.innerText = "Плеер офлайн";
                sdkStatus.innerText = "Офлайн";
            });

            playerInstance.addListener('initialization_error', ({ message }) => {
                console.error('Ошибка инициализации:', message);
                screenLine1.innerText = "Ошибка SDK";
                screenLine2.innerText = message;
            });

            playerInstance.addListener('authentication_error', ({ message }) => {
                console.error('Ошибка авторизации:', message);
                screenLine1.innerText = "Ошибка авторизации";
                screenLine2.innerText = "Проверьте секрет";
            });

            // Подключаемся к Spotify
            playerInstance.connect();
        };

        // Обработка кнопки запуска плейлиста
        document.getElementById('loadPlaylistBtn').addEventListener('click', async () => {
            if (!deviceId) {
                alert("Плеер еще не инициализировался. Подожди пару секунд!");
                return;
            }

            const token = await getSpotifyAccessToken();
            if (!token) return;

            try {
                const response = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        context_uri: "spotify:playlist:37i9dQZF1DXcBWIGoYBM5M"
                    })
                });

                if (response.ok) {
                    screenLine1.innerText = "Воспроизведение";
                    screenLine2.innerText = "Плейлист запущен";
                } else {
                    const errData = await response.json();
                    console.error("Ошибка запуска:", errData);
                    alert("Требуется Spotify Premium для удаленного запуска воспроизведения через Web SDK!");
                }
            } catch (err) {
                console.error("Ошибка запроса воспроизведения:", err);
            }
        });

        // Кнопка Play / Pause
        document.getElementById('playBtn').addEventListener('click', () => {
            if (playerInstance) {
                playerInstance.togglePlay();
            }
        });

        // Кнопки Next / Prev
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (playerInstance) playerInstance.previousTrack();
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (playerInstance) playerInstance.nextTrack();
        });

        // Управление громкостью
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            const vol = e.target.value / 100;
            if (playerInstance) {
                playerInstance.setVolume(vol);
            }
        });
    </script>
</body>
</html>
