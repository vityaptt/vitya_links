<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitya's Portfolio / Guestbook</title>
    <style>
        /* Стили можно оставить ваши текущие, главное — логика скрипта ниже */
        body {
            font-family: Arial, sans-serif;
            background: #282c34;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .window {
            background: #3a3f4b;
            border: 1px solid #4f5666;
            border-radius: 5px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .messages-list {
            max-height: 300px;
            overflow-y: auto;
            background: #21252b;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .message-item {
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .message-item strong {
            color: #61afef;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: #1e1e1e;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #98c379;
            color: #1e1e1e;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #85b165;
        }
    </style>
</head>
<body>

    <div class="window">
        <h2>Гостевая книга</h2>
        
        <!-- Список сообщений -->
        <div id="messagesList" class="messages-list">
            Загрузка сообщений...
        </div>

        <!-- Форма отправки -->
        <form id="guestbookForm">
            <input type="text" id="guestName" placeholder="Ваше имя" required>
            <textarea id="guestText" placeholder="Ваше сообщение..." rows="3" required></textarea>
            <button type="submit">Отправить</button>
        </form>
    </div>

    <!-- Подключаем Firebase через CDN (модульная версия) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Актуальная конфигурация Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyCKo0rGyP_DU1BNG9iqQfmm8h49twimVE",
          authDomain: "vitya-guestbook.firebaseapp.com",
          projectId: "vitya-guestbook",
          storageBucket: "vitya-guestbook.firebasestorage.app",
          messagingSenderId: "446796880365",
          appId: "1:446796880365:web:1e5849eb562645cb0b6fe4",
          measurementId: "G-CBGCJ1MFE0"
        };

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const messagesList = document.getElementById('messagesList');
        const guestbookForm = document.getElementById('guestbookForm');
        const guestNameInput = document.getElementById('guestName');
        const guestTextInput = document.getElementById('guestText');

        // Получение и отображение сообщений в реальном времени
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(50));
        
        onSnapshot(q, (snapshot) => {
            messagesList.innerHTML = '';
            if (snapshot.empty) {
                messagesList.innerHTML = '<p style="color: #aaa;">Пока нет ни одного сообщения. Будьте первыми!</p>';
                return;
            }
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'message-item';
                
                const safeName = data.name ? escapeHtml(data.name) : 'Аноним';
                const safeText = data.text ? escapeHtml(data.text) : '';
                
                div.innerHTML = `<strong>${safeName}:</strong> <p style="margin: 5px 0 0 0;">${safeText}</p>`;
                messagesList.appendChild(div);
            });
            
            // Автопрокрутка вниз
            messagesList.scrollTop = messagesList.scrollHeight;
        }, (error) => {
            console.error("Ошибка загрузки сообщений: ", error);
            messagesList.innerHTML = '<p style="color: #e06c75;">Ошибка загрузки сообщений.</p>';
        });

        // Отправка нового сообщения
        guestbookForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = guestNameInput.value.trim();
            const text = guestTextInput.value.trim();
            
            if (!name || !text) return;

            try {
                await addDoc(collection(db, "messages"), {
                    name: name,
                    text: text,
                    timestamp: serverTimestamp()
                });
                
                guestTextInput.value = ''; // Очищаем поле текста
            } catch (error) {
                console.error("Ошибка при отправке сообщения: ", error);
                alert("Не удалось отправить сообщение. Проверьте консоль.");
            }
        });

        // Простая защита от XSS
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;")
                      .replace(/</g, "&lt;")
                      .replace(/>/g, "&gt;")
                      .replace(/"/g, "&quot;")
                      .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
