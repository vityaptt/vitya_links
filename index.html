<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ВИТЯ - Desktop</title>
  <!-- 98.css for authentic Windows 95 / 98 UI elements -->
  <link rel="stylesheet" href="https://unpkg.com/98.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #008080; /* Classic Win95 Teal background */
      font-family: "MS Sans Serif", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
      padding: 10px;
      user-select: none;
    }

    /* Desktop layout area */
    .desktop {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: 40px; /* Leave room for taskbar */
    }

    /* Main Window */
    .window {
      width: 360px;
      max-width: 95vw;
      box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff, inset -2px -2px #808080, inset 2px 2px #dfdfdf;
    }

    .title-bar {
      background: linear-gradient(90deg, #000080, #1084d0);
      padding: 3px 2px 3px 3px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title-bar-text {
      color: white;
      font-weight: bold;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .window-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background-color: #c0c0c0;
    }

    /* Custom Name Styling: "ВИТЯ" in black Arial, stretched vertically */
    .site-title {
      font-family: Arial, sans-serif;
      font-weight: 900;
      font-size: 38px;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: inline-block;
      transform: scaleY(1.4); /* Vertical stretch */
      margin: 10px 0 14px 0;
      text-shadow: 1px 1px 0px #ffffff;
    }

    /* Profile Box / Screen Area */
    .status-field {
      width: 100%;
      background: #ffffff;
      border: 2px solid;
      border-color: #808080 #fff #fff #808080;
      padding: 8px 12px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-icon {
      width: 32px;
      height: 32px;
      background-color: #000080;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      border: 1px solid #000;
      flex-shrink: 0;
    }

    .status-text {
      color: #000;
      line-height: 1.3;
    }

    /* Buttons Container */
    .links-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Windows 95 Styled Link Buttons */
    .win-button {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      width: 100%;
      padding: 8px 12px;
      text-decoration: none;
      color: #000 !important;
      font-weight: bold;
      font-size: 13px;
      background: #c0c0c0;
      box-shadow: inset 1px 1px #fff, inset -1px -1px #0a0a0a, inset 2px 2px #dfdfdf, inset -2px -2px #808080;
      cursor: pointer;
      border: none;
      outline: none;
    }

    .win-button:active {
      box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
      padding: 9px 11px 7px 13px; /* Shift text down-right on press */
    }

    .button-icon {
      width: 20px;
      height: 20px;
      display: inline-block;
    }

    /* Footer Info / Status bar inside window */
    .status-bar {
      width: 100%;
      display: flex;
      gap: 2px;
      margin-top: 4px;
    }

    .status-bar-field {
      background: #c0c0c0;
      border: 1px solid;
      border-color: #808080 #fff #fff #808080;
      padding: 2px 6px;
      font-size: 11px;
      color: #404040;
    }

    /* Windows Taskbar */
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      background: #c0c0c0;
      border-top: 2px solid #fff;
      display: flex;
      align-items: center;
      padding: 2px 4px;
      justify-content: space-between;
      z-index: 999;
    }

    .start-container {
      position: relative;
    }

    .start-button {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: bold;
      font-size: 12px;
      padding: 2px 6px;
      height: 22px;
      box-shadow: inset 1px 1px #fff, inset -1px -1px #0a0a0a, inset 2px 2px #dfdfdf, inset -2px -2px #808080;
      background: #c0c0c0;
      border: none;
      cursor: pointer;
    }

    .start-button:active, .start-button.active {
      box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
    }

    /* Windows 95 Start Menu Pop-up */
    .start-menu {
      display: none;
      position: absolute;
      bottom: 28px;
      left: 0;
      width: 220px;
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .start-menu.open {
      display: flex;
    }

    .start-menu-side {
      width: 26px;
      background: linear-gradient(0deg, #000080, #1084d0);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: white;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 8px 4px;
      letter-spacing: 1px;
    }

    .start-menu-items {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2px;
    }

    .start-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      text-decoration: none;
      color: #000;
      font-size: 11px;
      font-weight: bold;
    }

    .start-menu-item:hover {
      background-color: #000080;
      color: #ffffff;
    }

    .start-menu-item img {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .start-menu-divider {
      height: 1px;
      background: #808080;
      border-bottom: 1px solid #fff;
      margin: 2px 0;
    }

    .taskbar-divider {
      width: 2px;
      height: 20px;
      background: #808080;
      border-right: 1px solid #fff;
      margin: 0 4px;
    }

    .taskbar-tasks {
      flex: 1;
      display: flex;
      gap: 4px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 8px;
      height: 22px;
      max-width: 160px;
      background: #c0c0c0;
      box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
      font-weight: bold;
    }

    .tray {
      border: 1px solid;
      border-color: #808080 #fff #fff #808080;
      padding: 2px 8px;
      font-size: 11px;
      height: 22px;
      display: flex;
      align-items: center;
      background: #c0c0c0;
    }
  </style>
</head>
<body>

  <div class="desktop">
    <!-- Main Windows 95 Window -->
    <div class="window">
      <div class="title-bar">
        <div class="title-bar-text">
          <img src="https://win98icons.alexmeub.com/icons/png/user_world-0.png" width="14" height="14" alt="icon">
          C:\WINDOWS\Personal\VITYA.exe
        </div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
        </div>
      </div>

      <div class="window-body">
        <!-- Main stretched Arial Title -->
        <div class="site-title">ВИТЯ</div>

        <!-- Status Card -->
        <div class="status-field">
          <div class="status-icon">V</div>
          <div class="status-text">
            <strong>Состояние:</strong> Online<br/>
            <span>Нажми на ссылку ниже для перехода</span>
          </div>
        </div>

        <!-- Link Buttons -->
        <div class="links-container">
          <a href="https://t.me/datizaebalsuca" target="_blank" rel="noopener" class="win-button">
            <img src="https://win98icons.alexmeub.com/icons/png/envelope_closed-0.png" class="button-icon" alt="Telegram">
            Telegram
          </a>

          <a href="https://www.twitch.tv/vityaptt" target="_blank" rel="noopener" class="win-button">
            <img src="https://win98icons.alexmeub.com/icons/png/display_properties-2.png" class="button-icon" alt="Twitch">
            Twitch
          </a>

          <a href="https://boosty.to/viteapotatkafm" target="_blank" rel="noopener" class="win-button">
            <img src="https://win98icons.alexmeub.com/icons/png/key_padlock-0.png" class="button-icon" alt="Boosty">
            Boosty
          </a>

          <a href="https://www.youtube.com/@potatkadwg/featured" target="_blank" rel="noopener" class="win-button">
            <img src="https://win98icons.alexmeub.com/icons/png/cd_audio_cd_a-2.png" class="button-icon" alt="YouTube">
            YouTube
          </a>
        </div>

        <!-- Bottom status bar -->
        <div class="status-bar">
          <div class="status-bar-field" style="flex: 1;">4 объекта(ов)</div>
          <div class="status-bar-field">Win95 Edition</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Windows 95 Taskbar -->
  <div class="taskbar">
    <div style="display: flex; align-items: center;">
      <div class="start-container">
        <!-- Start Button -->
        <button class="start-button" id="startButton">
          <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="14" height="14" alt="Start">
          <strong>Пуск</strong>
        </button>

        <!-- Easter Egg Start Menu Pop-up -->
        <div class="start-menu" id="startMenu">
          <div class="start-menu-side">прив чд</div>
          <div class="start-menu-items">
            <a href="https://open.spotify.com/user/gtahh91k0wd62si8reaw9c0w5?si=da4a95cad13442c1" target="_blank" rel="noopener" class="start-menu-item">
              <img src="https://win98icons.alexmeub.com/icons/png/media_player-0.png" alt="Spotify">
              Spotify
            </a>
            <a href="https://t.me/potatka" target="_blank" rel="noopener" class="start-menu-item">
              <img src="https://win98icons.alexmeub.com/icons/png/address_book-0.png" alt="Telegram">
              Личный Telegram
            </a>
            <div class="start-menu-divider"></div>
            <a href="https://t.me/InYourEyesVault" target="_blank" rel="noopener" class="start-menu-item">
              <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" alt="Memes">
              Мемы (Vault)
            </a>
          </div>
        </div>
      </div>

      <div class="taskbar-divider"></div>
      <div class="taskbar-tasks">
        <div class="task-item">
          <img src="https://win98icons.alexmeub.com/icons/png/user_world-0.png" width="12" height="12" alt="App">
          ВИТЯ - Links
        </div>
      </div>
    </div>
    <div class="tray" id="clock">12:00</div>
  </div>

  <script>
    // Live Clock for Windows Taskbar
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = hours + ':' + minutes;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Start Menu Toggle
    const startButton = document.getElementById('startButton');
    const startMenu = document.getElementById('startMenu');

    startButton.addEventListener('click', (e) => {
      e.stopPropagation();
      startMenu.classList.toggle('open');
      startButton.classList.toggle('active');
    });

    // Close menu when clicking outside
    document.addEventListener('click', () => {
      startMenu.classList.remove('open');
      startButton.classList.remove('active');
    });
  </script>
</body>
</html>
